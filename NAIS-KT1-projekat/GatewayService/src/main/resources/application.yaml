server:
  port: 9000

spring:
  application:
    name: gateway-api

  cloud:
    gateway:
      routes:
        - id: sales-process-tracking-service
          uri: lb://sales-process-tracking-service
          predicates:
            - Path=/sales/**
          filters:
            - StripPrefix=1

        - id: product-portfolio-service
          uri: lb://product-portfolio-service
          predicates:
            - Path=/portfolio/**
          filters:
            - StripPrefix=1

        - id: collaborative-pricelist-service
          uri: lb://collaborative-pricelist-service
          predicates:
            - Path=/pricelist/**
          filters:
            - StripPrefix=1

        - id: vector-database-service
          uri: lb://vector-database-service
          predicates:
            - Path=/vector/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true